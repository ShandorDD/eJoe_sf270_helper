    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F4F6F9; color: #1A1F2E; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D0D8E8; border-radius: 3px; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .upload-zone:hover { border-color: #4A6FA5 !important; background: #EEF4FA !important; }
    .expand-btn:hover { background: rgba(0,0,0,0.04) !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scoreRing {
      from { stroke-dashoffset: 283; }
      to   { stroke-dashoffset: var(--target-offset); }
    }
    .ring-circle {
      animation: scoreRing 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
      animation-delay: 0.3s;
      stroke-dashoffset: 283;
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .ocr-field:focus { border-color: #4A6FA5 !important; outline: none; }
    .ocr-field.uncertain { border-color: #D97706 !important; background: #FFFBEB !important; }
  </style>
